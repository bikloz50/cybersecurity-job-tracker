name: Update Job Listings

on:
  schedule:
    - cron: "0 13 * * 1-5"  # 8 AM ET (13:00 UTC) weekdays
    - cron: "0 17 * * 1-5"  # 12 PM ET (17:00 UTC) weekdays
    - cron: "0 22 * * 1-5"  # 5 PM ET (22:00 UTC) weekdays
  workflow_dispatch:          # allow manual run from GitHub UI

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run aggregator
        env:
          USAJOBS_KEY: ${{ secrets.USAJOBS_KEY }}
        run: python3 cyberjobs.py

      - name: Commit updated outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cyber_jobs.html cyber_jobs.csv cyber_jobs.md
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: auto-update job listings $(date -u +%Y-%m-%d)"
          git push
